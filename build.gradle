buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:9.2.1'
    }
}

plugins {
  id "org.sonarqube" version "7.3.1.8318"
}

repositories {
    google()
    mavenCentral()
}

apply plugin: 'com.android.application'

android {

    compileSdk 37

    defaultConfig {
        applicationId "de.j4velin.wifiAutoOff"
        minSdk 23
        targetSdk 28
        versionCode 2100
        versionName "2.1.0"
        if (!project.file("key.properties").exists()) {
            resValue "string", "maps_api_key", "0000"
        }
    }

    buildFeatures {
        buildConfig = true
        resValues = true
    }

    flavorDimensions = ["main"]

    productFlavors {
        fdroid {
            dimension "main"
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-project.txt'
        }
    }

    lint {
        // ExpiredTargetSdkVersion is a Google Play requirement; not applicable to F-Droid builds
        disable "ExtraTranslation", "ExpiredTargetSdkVersion"
    }
    namespace 'de.j4velin.wifiAutoOff'
}


dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
    implementation 'androidx.recyclerview:recyclerview:1.4.0'
    implementation 'androidx.core:core:1.19.0'
}
