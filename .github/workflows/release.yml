name: Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.9.2)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve tag
        id: tag
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build release APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleFdroidRelease

      - name: Sign APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -x
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"
          BT=$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -1)
          UNSIGNED=$(find "$GITHUB_WORKSPACE" -path '*/release/*' -name '*.apk' | head -1)
          echo "Found unsigned APK: $UNSIGNED"
          if [ -z "$UNSIGNED" ]; then
            echo "No release APK found anywhere:"
            find "$GITHUB_WORKSPACE" -name '*.apk' -print
            exit 1
          fi
          OUT="$GITHUB_WORKSPACE/wifi-automatic-${{ steps.tag.outputs.name }}.apk"
          "$BT/zipalign" -f 4 "$UNSIGNED" "$OUT"
          "$BT/apksigner" sign \
            --ks "$RUNNER_TEMP/release.jks" \
            --ks-pass "pass:$KEYSTORE_PASSWORD" \
            --ks-key-alias "$KEY_ALIAS" \
            --key-pass "pass:$KEY_PASSWORD" \
            "$OUT"
          "$BT/apksigner" verify "$OUT"
          echo "APK=$OUT" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          files: ${{ env.APK }}
          generate_release_notes: true
