name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleFdroidDebug

      - uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: build/outputs/apk/fdroid/debug/wifi-fdroid-debug.apk
